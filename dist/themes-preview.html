<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriScan — Theme Picker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    padding: 24px 16px 60px;
    min-height: 100vh;
  }
  h1 {
    color: #fff;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.04em;
    text-align: center;
    margin-bottom: 6px;
  }
  .subtitle {
    color: #888;
    font-size: 14px;
    text-align: center;
    margin-bottom: 36px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .theme-wrapper {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .theme-label {
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .theme-label span {
    font-size: 11px;
    font-weight: 500;
    color: #666;
    text-transform: none;
    letter-spacing: 0;
  }
  .phone {
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
    position: relative;
  }
  .screen {
    padding: 0;
    min-height: 580px;
    display: flex;
    flex-direction: column;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    font-size: 13px;
    font-weight: 600;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 10px 0 20px;
    margin-top: auto;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 500;
    flex: 1;
  }
  .nav-dot {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    opacity: 0.35;
  }
  .nav-dot.active { opacity: 1; }
  .fab-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: -16px;
    font-size: 20px;
    flex-shrink: 0;
  }

  /* ── CONTENT ── */
  .content {
    padding: 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .greeting {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1.1;
  }
  .greeting-sub {
    font-size: 12px;
    margin-top: 2px;
  }
  .card {
    border-radius: 16px;
    padding: 16px;
  }
  .card-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0.5;
  }
  .big-number {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -0.05em;
    line-height: 1;
  }
  .unit {
    font-size: 13px;
    font-weight: 500;
    opacity: 0.5;
  }
  .progress-track {
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    width: 68%;
  }
  .macro-row {
    display: flex;
    gap: 8px;
    margin-top: 0;
  }
  .macro-chip {
    flex: 1;
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }
  .macro-val {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .macro-lbl {
    font-size: 9px;
    font-weight: 600;
    opacity: 0.5;
    text-transform: uppercase;
    margin-top: 2px;
    letter-spacing: 0.03em;
  }
  .btn-primary {
    border-radius: 14px;
    padding: 14px;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    cursor: pointer;
    margin-top: auto;
  }

  /* ── CHOSEN BADGE ── */
  .vote-btn {
    background: #333;
    border: 1px solid #444;
    color: #fff;
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .vote-btn:hover { background: #444; border-color: #666; }
  .vote-btn.selected { background: #22c55e; border-color: #22c55e; color: #000; }

  .winner-banner {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #22c55e;
    color: #000;
    padding: 14px 28px;
    border-radius: 100px;
    font-size: 15px;
    font-weight: 700;
    box-shadow: 0 8px 32px rgba(34,197,94,0.4);
    z-index: 999;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }
  .winner-banner.show { display: block; }
</style>
</head>

                <div class="nav-item" style="flex:1">
                  <div class="fab-btn" style="background:${t.accent};box-shadow:0 0 0 3px ${t.bg.startsWith('linear') ? '#f0f8f0' : t.bg},0 4px 16px ${t.accent}44;">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="${t.btnText}" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="11" y="2" width="5" height="5" rx="1"/><rect x="2" y="11" width="5" height="5" rx="1"/><rect x="11" y="11" width="2" height="2" rx=".3" fill="${t.btnText}" stroke="none"/><rect x="14" y="11" width="2" height="2" rx=".3" fill="${t.btnText}" stroke="none"/><rect x="11" y="14" width="2" height="2" rx=".3" fill="${t.btnText}" stroke="none"/></svg>
                  </div>
                  <span style="font-size:9px;font-weight:600;color:${t.navActive}">Scan</span>
                </div>`;
              const isActive = i === 0;
              return `
                <div class="nav-item" style="color:${isActive ? t.navActive : t.navInactive};">
                  <div style="position:relative;width:28px;height:28px;display:flex;align-items:center;justify-content:center;">
                    ${isActive ? `<div style="position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:20px;height:2.5px;border-radius:2px;background:${t.navActive};box-shadow:0 0 6px ${t.navActive}88;"></div>` : ''}
                    <span style="font-size:18px;">${icon}</span>
                  </div>
                  <span style="font-size:9px;font-weight:600;">${['Início','Histórico','','Coach','Perfil'][i]}</span>
                </div>`;
            }).join('')}
          </div>

        </div>
      </div>
      <button class="vote-btn" onclick="vote(${t.id}, '${t.name}')" id="vote-${t.id}">
        Escolher este →
      </button>
    </div>
  `;
}

document.getElementById('grid').innerHTML = themes.map(renderTheme).join('');

function vote(id, name) {
  // Clear all
  document.querySelectorAll('.vote-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById(`vote-${id}`).classList.add('selected');

  const banner = document.getElementById('winner');
  banner.textContent = `✓ Conceito ${id} escolhido: "${name}" — diga ao Claude para implementar!`;
  banner.classList.add('show');

  setTimeout(() => banner.classList.remove('show'), 4000);
}
</script>

</body>
</html>

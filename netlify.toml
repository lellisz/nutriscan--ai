[build]
command = "npm ci --legacy-peer-deps && npm run build"
publish = "dist"
ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- ."

[build.environment]
NODE_VERSION = "18"
NODE_ENV = "production"

# ── Security headers ──────────────────────────────────────
# Aplicados a todas as respostas do frontend.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://*.sentry.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.sentry.io https://api.groq.com https://generativelanguage.googleapis.com; font-src 'self' data:; frame-ancestors 'none';"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
